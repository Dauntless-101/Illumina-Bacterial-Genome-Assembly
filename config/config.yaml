# ============================================================
# Illumina-Bacterial-Genome-Assembly Configuration
# ============================================================

# Sample sheet (tab‑separated with columns: sample, r1, r2)
# Uncomment and set the path when you have a sample sheet ready.
# sample_sheet: "my_samples.tsv"

# Assembly parameters
assembly:
  genome_size: 5m

# BUSCO lineage dataset
busco:
  lineage: bacteria_odb10

# Bakta database path (download with: bakta_db download --output <path>)
bakta:
  db_path: "resources/bakta_db"

# Resources
resources:
  default_threads: 16
  memory_mb: 32000

# Pipeline metadata
pipeline:
  version: "1.0.0"

logging:
  keep_intermediate: false

benchmarking:
  enabled: true
