name: Lint Workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.11"
          environment-file: environment.yml
          activate-environment: illumina-assembly

      - name: Create dummy sample sheet for lint
        run: |
          # Snakefile reads config["sample_sheet"] at parse time.
          # Provide a minimal file so --lint can complete.
          echo -e "sample\tr1\tr2" > my_samples.tsv
          echo -e "dummy\tdummy_R1.fastq.gz\tdummy_R2.fastq.gz" >> my_samples.tsv

      - name: Lint Snakemake workflow
        run: |
          snakemake --lint
